<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Ads Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e1e4e8; padding: 24px; min-height: 100vh; }
  h1 { font-size: 1.6rem; margin-bottom: 4px; color: #fff; }
  .subtitle { color: #8b949e; font-size: 0.9rem; margin-bottom: 24px; }
  h2 { font-size: 1.15rem; color: #c9d1d9; margin-bottom: 14px; }
  .section { margin-bottom: 32px; }

  /* Summary Cards */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 32px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 18px 20px; }
  .card .label { font-size: 0.78rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .card .value { font-size: 1.5rem; font-weight: 700; color: #58a6ff; }
  .card .value.green { color: #3fb950; }
  .card .value.purple { color: #bc8cff; }
  .card .value.orange { color: #d29922; }
  .card .value.red { color: #f85149; }

  /* Chart */
  .chart-container { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; }
  canvas { width: 100% !important; height: 320px !important; }

  /* Tables */
  .table-wrap { background: #161b22; border: 1px solid #30363d; border-radius: 10px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { background: #1c2128; color: #8b949e; font-weight: 600; text-transform: uppercase; font-size: 0.72rem; letter-spacing: 0.4px; padding: 12px 14px; text-align: left; white-space: nowrap; position: sticky; top: 0; }
  td { padding: 10px 14px; border-top: 1px solid #21262d; white-space: nowrap; }
  tr:hover td { background: #1c2128; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .good { color: #3fb950; }
  .bad { color: #f85149; }
  .ad-name { max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Funnel */
  .funnel-grid { display: grid; grid-template-columns: 1fr; gap: 18px; }
  .funnel-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 18px 20px; }
  .funnel-card h3 { font-size: 0.9rem; color: #58a6ff; margin-bottom: 12px; }
  .funnel-bar-wrap { display: flex; align-items: center; margin-bottom: 8px; gap: 10px; }
  .funnel-label { width: 130px; font-size: 0.78rem; color: #8b949e; text-align: right; flex-shrink: 0; }
  .funnel-bar-bg { flex: 1; height: 26px; background: #21262d; border-radius: 4px; position: relative; overflow: hidden; }
  .funnel-bar { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 8px; font-size: 0.75rem; font-weight: 600; color: #fff; min-width: 2px; transition: width 0.4s; }
  .funnel-bar.c0 { background: #58a6ff; }
  .funnel-bar.c1 { background: #bc8cff; }
  .funnel-bar.c2 { background: #d29922; }
  .funnel-bar.c3 { background: #f78166; }
  .funnel-bar.c4 { background: #3fb950; }
  .funnel-val { font-size: 0.78rem; color: #c9d1d9; width: 80px; flex-shrink: 0; }
</style>
</head>

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i+1] === '"') { current += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { current += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { result.push(current); current = ''; }
      else { current += ch; }
    }
  }
  result.push(current);
  return result;
}

function num(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }
function gbp(v) { return '£' + v.toLocaleString('en-GB', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }
function fmt(v) { return v.toLocaleString('en-GB'); }
function pct(v) { return v.toFixed(2) + 'x'; }
function shortName(n) { return n.length > 50 ? n.substring(0, 47) + '...' : n; }

// Parse data
const rows = parseCSV(csvText);

// Summary
const totalSpend = rows.reduce((s, r) => s + num(r['Amount spent (GBP)']), 0);
const totalPurchases = rows.reduce((s, r) => s + num(r['Purchases']), 0);
const totalRevenue = rows.reduce((s, r) => s + num(r['Purchases conversion value']), 0);
const roas = totalRevenue / totalSpend;
const avgCPP = totalSpend / totalPurchases;

const dates = [...new Set(rows.map(r => r['Day']))].sort();
document.getElementById('dateRange').textContent = `${dates[0]} to ${dates[dates.length-1]} · ${rows.length} ad entries · ${dates.length} days`;

document.getElementById('summaryCards').innerHTML = [
  { label: 'Total Spend', value: gbp(totalSpend), cls: '' },
  { label: 'Total Purchases', value: fmt(totalPurchases), cls: 'green' },
  { label: 'Total Revenue', value: gbp(totalRevenue), cls: 'green' },
  { label: 'ROAS', value: pct(roas), cls: 'purple' },
  { label: 'Avg Cost per Purchase', value: gbp(avgCPP), cls: 'orange' },
].map(c => `<div class="card"><div class="label">${c.label}</div><div class="value ${c.cls}">${c.value}</div></div>`).join('');

// Daily trend data
const dailyData = {};
dates.forEach(d => dailyData[d] = { spend: 0, revenue: 0 });
rows.forEach(r => {
  dailyData[r['Day']].spend += num(r['Amount spent (GBP)']);
  dailyData[r['Day']].revenue += num(r['Purchases conversion value']);
});

// Draw trend chart
function drawChart() {
  const canvas = document.getElementById('trendChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top: 30, right: 20, bottom: 50, left: 70 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  const spends = dates.map(d => dailyData[d].spend);
  const revs = dates.map(d => dailyData[d].revenue);
  const maxVal = Math.max(...spends, ...revs) * 1.1;

  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#21262d';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + ch - (ch * i / 4);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
    ctx.fillStyle = '#8b949e'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText('£' + Math.round(maxVal * i / 4).toLocaleString(), pad.left - 8, y + 4);
  }

  // X labels
  ctx.fillStyle = '#8b949e'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  dates.forEach((d, i) => {
    const x = pad.left + (cw * i / (dates.length - 1));
    ctx.fillText(d.substring(5), x, H - pad.bottom + 20);
  });

  function drawLine(data, color) {
    ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
    ctx.beginPath();
    data.forEach((v, i) => {
      const x = pad.left + (cw * i / (dates.length - 1));
      const y = pad.top + ch - (ch * v / maxVal);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    // Dots
    data.forEach((v, i) => {
      const x = pad.left + (cw * i / (dates.length - 1));
      const y = pad.top + ch - (ch * v / maxVal);
      ctx.fillStyle = color; ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
    });
  }

  drawLine(spends, '#f85149');
  drawLine(revs, '#3fb950');

  // Legend
  ctx.font = '12px sans-serif';
  const lx = pad.left + 10;
  ctx.fillStyle = '#f85149'; ctx.fillRect(lx, pad.top - 20, 14, 3);
  ctx.fillStyle = '#c9d1d9'; ctx.textAlign = 'left'; ctx.fillText('Spend', lx + 20, pad.top - 14);
  ctx.fillStyle = '#3fb950'; ctx.fillRect(lx + 80, pad.top - 20, 14, 3);
  ctx.fillStyle = '#c9d1d9'; ctx.fillText('Revenue', lx + 100, pad.top - 14);
}
drawChart();
window.addEventListener('resize', drawChart);

// Campaign breakdown
const campaigns = {};
rows.forEach(r => {
  const c = r['Campaign name'];
  if (!campaigns[c]) campaigns[c] = { spend: 0, purchases: 0, revenue: 0, impressions: 0, clicks: 0, atc: 0, checkouts: 0 };
  campaigns[c].spend += num(r['Amount spent (GBP)']);
  campaigns[c].purchases += num(r['Purchases']);
  campaigns[c].revenue += num(r['Purchases conversion value']);
  campaigns[c].impressions += num(r['Impressions']);
  campaigns[c].clicks += num(r['Link clicks']);
  campaigns[c].atc += num(r['Adds to cart']);
  campaigns[c].checkouts += num(r['Checkouts initiated']);
});

const campRows = Object.entries(campaigns).sort((a, b) => b[1].spend - a[1].spend);
document.getElementById('campaignTable').innerHTML = `
  <thead><tr><th>Campaign</th><th class="num">Spend</th><th class="num">Purchases</th><th class="num">Revenue</th><th class="num">ROAS</th><th class="num">Cost/Purchase</th></tr></thead>
  <tbody>${campRows.map(([name, d]) => {
    const r = d.revenue / d.spend;
    const cpp = d.purchases > 0 ? d.spend / d.purchases : 0;
    return `<tr>
      <td>${name}</td>
      <td class="num">${gbp(d.spend)}</td>
      <td class="num">${d.purchases}</td>
      <td class="num">${gbp(d.revenue)}</td>
      <td class="num ${r >= 1 ? 'good' : 'bad'}">${pct(r)}</td>
      <td class="num">${d.purchases > 0 ? gbp(cpp) : '—'}</td>
    </tr>`;
  }).join('')}</tbody>`;

// Aggregate ads
const ads = {};
rows.forEach(r => {
  const key = r['Ad name'];
  if (!ads[key]) ads[key] = { name: key, campaign: r['Campaign name'], spend: 0, purchases: 0, revenue: 0 };
  ads[key].spend += num(r['Amount spent (GBP)']);
  ads[key].purchases += num(r['Purchases']);
  ads[key].revenue += num(r['Purchases conversion value']);
});

// Top 5 by ROAS (min £5 spend, >=1 purchase)
const qualified = Object.values(ads).filter(a => a.spend >= 5 && a.purchases >= 1);
const topByROAS = [...qualified].sort((a, b) => (b.revenue / b.spend) - (a.revenue / a.spend)).slice(0, 5);

document.getElementById('topAdsTable').innerHTML = `
  <thead><tr><th>Ad Name</th><th class="num">Spend</th><th class="num">Purchases</th><th class="num">Revenue</th><th class="num">ROAS</th></tr></thead>
  <tbody>${topByROAS.map(a => `<tr>
    <td class="ad-name" title="${a.name}">${shortName(a.name)}</td>
    <td class="num">${gbp(a.spend)}</td>
    <td class="num">${a.purchases}</td>
    <td class="num">${gbp(a.revenue)}</td>
    <td class="num good">${pct(a.revenue / a.spend)}</td>
  </tr>`).join('')}</tbody>`;

// Bottom 5 by cost per purchase (worst = highest CPP, >=1 purchase)
const withPurchases = Object.values(ads).filter(a => a.purchases >= 1);
const bottomByCPP = [...withPurchases].sort((a, b) => (b.spend / b.purchases) - (a.spend / a.purchases)).slice(0, 5);

document.getElementById('bottomAdsTable').innerHTML = `
  <thead><tr><th>Ad Name</th><th class="num">Spend</th><th class="num">Purchases</th><th class="num">Cost/Purchase</th></tr></thead>
  <tbody>${bottomByCPP.map(a => `<tr>
    <td class="ad-name" title="${a.name}">${shortName(a.name)}</td>
    <td class="num">${gbp(a.spend)}</td>
    <td class="num">${a.purchases}</td>
    <td class="num bad">${gbp(a.spend / a.purchases)}</td>
  </tr>`).join('')}</tbody>`;

// Funnel by campaign
const funnelHTML = campRows.map(([name, d]) => {
  const steps = [
    { label: 'Impressions', val: d.impressions, cls: 'c0' },
    { label: 'Link Clicks', val: d.clicks, cls: 'c1' },
    { label: 'Add to Cart', val: d.atc, cls: 'c2' },
    { label: 'Checkout Init', val: d.checkouts, cls: 'c3' },
    { label: 'Purchase', val: d.purchases, cls: 'c4' },
  ];
  const maxStep = steps[0].val || 1;
  return `<div class="funnel-card"><h3>${name}</h3>${steps.map(s => {
    const pctW = Math.max((s.val / maxStep) * 100, 0.5);
    return `<div class="funnel-bar-wrap">
      <div class="funnel-label">${s.label}</div>
      <div class="funnel-bar-bg"><div class="funnel-bar ${s.cls}" style="width:${pctW}%">${pctW > 8 ? fmt(s.val) : ''}</div></div>
      <div class="funnel-val">${fmt(s.val)}</div>
    </div>`;
  }).join('')}</div>`;
}).join('');
document.getElementById('funnelGrid').innerHTML = funnelHTML;
</script>
